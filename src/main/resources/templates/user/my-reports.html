<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports</title>
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="icon" th:href="@{/images/icon.jpg}" >
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/admin-reports.css}">
</head>
<body style="padding-top: 100px;">
<nav class="navbar navbar-expand-lg fixed-top " data-bs-theme="dark" >
    <div class="container-fluid">
        <div>
            <button class="navbar-toggler px-2 py-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand fs-3 px-4" th:href="@{/user/index}">Safe Lanka</a>
        </div>

        <div class="collapse navbar-collapse justify-content-center " id="navbarText">
            <ul class="navbar-nav fs-5">
                <li class="nav-item px-4 ">
                    <a class="nav-link" th:href="@{/user/index}">Home</a>
                </li>
                <li class="nav-item px-3 ">
                    <a class="nav-link" th:href="@{/disasters/report-incident-form}">Report Incident</a>
                </li>
                <li class="nav-item px-3 ">
                    <a class="nav-link active" th:href="@{/disasters/my-reports}">My Reports</a>
                </li>
            </ul>
        </div>
        <a  th:if="${userLoggedIn == false}" th:href="@{/user/login}">
            <button class="btn px-4 btn-lg mr-5" type="button" id="login-button">Login</button>
        </a>
        <a  th:if="${userLoggedIn == true}" th:href="@{/user/logout}">
            <button class="btn btn-danger px-4 btn-lg mr-5" type="button" id="logout-button">Logout</button>
        </a>
    </div>
</nav>
<div>
<!-- Success Alert-->
<div th:if="${successMessage}">
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        <strong>Success!</strong> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>
    <div style="margin: 10px 30px 30px 30px !important;">
    <table id="disasterTable">
        <thead>
        <tr>
            <th>Date</th>
            <th>Reported By</th>
            <th>Location</th>
            <th>Type</th>
            <th>Severity</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="disasterBody">
        <tr th:each="disaster: ${disasterList}">
            <td th:text="${disaster.createdAt}"></td>
            <td th:text="${disaster.fullName}"></td>
            <td th:text="${disaster.address}"></td>
            <td th:text="${disaster.disasterType}"></td>
            <td th:text="${disaster.severity}"></td>
            <td th:text="${disaster.status}"></td>
            <td><a th:href="@{/disasters/user/{id}(id=${disaster.id})}"><button type="button" class="btn btn-primary fs-5 p-2">Details</button></a></td>
        </tr>
        </tbody>
    </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
