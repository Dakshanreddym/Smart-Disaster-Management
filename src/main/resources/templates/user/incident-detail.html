<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Detail</title>
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="icon" th:href="@{/images/icon.jpg}" >
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        .report-image {
            position: relative;
            height: 300px;
            background-color: #bebdbd;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .report-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .report-details-section {
            padding: 30px;
            max-width: 800px;
            margin: 20px auto;
            background-color: #d3e3ef;
            border-radius: 6px;
            border: 2px solid #00418b;
        }
        p{
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top " data-bs-theme="dark" >
    <div class="container-fluid">
        <div>
            <button class="navbar-toggler px-2 py-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand fs-3 px-4" th:href="@{/user/index}">Safe Lanka</a>
        </div>

        <div class="collapse navbar-collapse justify-content-center " id="navbarText">
            <ul class="navbar-nav fs-5">
                <li class="nav-item px-4 ">
                    <a class="nav-link" th:href="@{/user/index}">Home</a>
                </li>
                <li class="nav-item px-3 ">
                    <a class="nav-link" th:href="@{/disasters/report-incident-form}">Report Incident</a>
                </li>
                <li class="nav-item px-3 ">
                    <a class="nav-link" th:href="@{/disasters/my-reports}">My Reports</a>
                </li>
            </ul>
        </div>
        <a  th:if="${userLoggedIn == false}" th:href="@{/user/login}">
            <button class="btn px-4 btn-lg mr-5" type="button" id="login-button">Login</button>
        </a>
        <a  th:if="${userLoggedIn == true}" th:href="@{/user/logout}">
            <button class="btn btn-danger px-4 btn-lg mr-5" type="button" id="logout-button">Logout</button>
        </a>
    </div>
</nav>
    <div class="report-details-section" style="margin-top: 85px !important;">
        <h2 class="text-center mb-4">Report Details</h2>
        <div class="report-image mb-4" id="image">
            <img th:src="${#strings.isEmpty(disaster.image)} ? '/images/defaultImage.jpg' : '/images/' + ${disaster.image}"
                 alt="Disaster Image"
                 class="img-fluid" />
        </div>
        <div class="reporter-info">
            <p><strong>Name:</strong> <span th:text="${disaster.fullName}"></span></p>
            <p><strong>Email:</strong> <span th:text="${disaster.email}"></span></p>
            <p><strong>Phone Number:</strong> <span th:text="${disaster.phoneNumber}"></span></p>
            <p><strong>NIC Number:</strong> <span th:text="${disaster.nicNumber}"></span></p>
            <p><strong>Address:</strong> <span th:text="${disaster.address}"></span></p>
            <p><strong>GN Division:</strong> <span th:text="${disaster.gnDivision}"></span></p>
            <p><strong>District:</strong> <span th:text="${disaster.district}"></span></p>
            <p><strong>Province:</strong> <span th:text="${disaster.province}"></span></p>
            <p><strong>Disaster Type:</strong> <span th:text="${disaster.disasterType}"></span></p>
            <p><strong>Severity:</strong> <span th:text="${disaster.severity}"></span></p>
            <p><strong>Affected Individuals:</strong> <span th:text="${disaster.affectedIndividuals}"></span></p>
            <p><strong>Status:</strong> <span th:text="${disaster.status}"></span></p>
            <p><strong>Impact:</strong> <span th:text="${disaster.impact}"></span></p>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
