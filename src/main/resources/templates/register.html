<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <title>Register</title>
    <link rel="icon" th:href="@{/images/icon.jpg}" >
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top " data-bs-theme="dark" >
    <div class="container-fluid">
        <div>
            <button class="navbar-toggler px-2 py-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand fs-3 px-4" th:href="@{/user/index}">Safe Lanka</a>
        </div>

        <div class="collapse navbar-collapse justify-content-center " id="navbarText">
            <ul class="navbar-nav fs-5">
                <li class="nav-item px-4 ">
                    <a class="nav-link"  th:href="@{/user/index}">Home</a>
                </li>
                <li th:if="${!userLoggedIn}" class="nav-item px-3 ">
                    <a class="nav-link" href="index#about">About Us</a>
                </li>
                <li class="nav-item px-3 ">
                    <a class="nav-link" th:href="@{/disasters/report-incident-form}">Report Incident</a>
                </li>
                <li th:if="${!userLoggedIn}" class="nav-item px-3 ">
                    <a class="nav-link" href="index#services">Services</a>
                </li>
                <li th:if="${userLoggedIn}" class="nav-item px-3 ">
                    <a class="nav-link" th:href="@{/disasters/my-reports}">My Reports</a>
                </li>
            </ul>
        </div>
        <a  th:if="${!userLoggedIn}" th:href="@{/user/login}">
            <button class="btn px-4 btn-lg mr-5" type="button" id="login-button">Login</button>
        </a>
        <a  th:if="${userLoggedIn}" th:href="@{/user/logout}">
            <button class="btn btn-danger px-4 btn-lg mr-5" type="button" id="logout-button">Logout</button>
        </a>
    </div>
</nav>


<div class="d-flex justify-content-center align-items-center">
    <div class="form-container">
        <h2 class="form-title text-center">User Registration</h2>
        <h5 class="text-center mb-4">Fill in the details to create your account.</h5>
        <!-- Success Alert-->
        <div th:if="${success}">
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <strong>Success!</strong> <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>

        <!-- Error Alert-->
        <div th:if="${error}">
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong>Error!</strong> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>

        <form class="form-responsive" th:action="@{/user/save}" method="POST" th:object="${user}">
            <div class="d-flex flex-column flex-md-row align-items-center custom-bg mt-2 form-input">
                <div class="label-container">
                    <span><i class="fa-solid fa-user"></i></span>
                    <label class="label-text" for="name">Name</label>
                </div>
                <input type="text" th:field="${user.name}" id="name" class="form-control mt-2 mt-md-0" placeholder="Enter your name" required>
            </div>
            <div class="alert alert-danger mt-1 p-1" th:if="${#fields.hasErrors('name')}" role="alert">
                <p  th:text="${#strings.arrayJoin(#fields.errors('name'), ', ')}" class="text-center"></p>
            </div>

            <div class="d-flex flex-column flex-md-row align-items-center custom-bg mt-3 form-input">
                <div class="label-container">
                    <span><i class="fa-solid fa-at"></i></span>
                    <label class="label-text" for="username">Username</label>
                </div>
                <input type="text" th:field="${user.username}" id="username" class="form-control mt-2 mt-md-0" placeholder="Enter your username" required>
            </div>
            <div class="alert alert-danger mt-1 p-1" th:if="${#fields.hasErrors('username')}" role="alert">
                <p  th:text="${#strings.arrayJoin(#fields.errors('username'), ', ')}" class="text-center"></p>
            </div>

            <div class="d-flex flex-column flex-md-row align-items-center custom-bg mt-3 form-input">
                <div class="label-container">
                    <span><i class="fa-solid fa-envelope"></i></span>
                    <label class="label-text" for="email">Email</label>
                </div>
                <input type="email" th:field="${user.email}" id="email" class="form-control mt-2 mt-md-0" placeholder="Enter your email" required>
            </div>
            <div class="alert alert-danger mt-1 p-1" th:if="${#fields.hasErrors('email')}" role="alert">
                <p  th:text="${#strings.arrayJoin(#fields.errors('email'), ', ')}" class="text-center"></p>
            </div>

            <div class="d-flex flex-column flex-md-row align-items-center custom-bg mt-3 form-input">
                <div class="label-container">
                    <span><i class="fa-solid fa-lock"></i></span>
                    <label class="label-text" for="password">Password</label>
                </div>
                <input type="password" th:field="${user.password}" id="password" class="form-control mt-2 mt-md-0" placeholder="Enter your password" required >
                <i class="fas fa-eye-slash" id="toggleRegisterPassword" style="cursor: pointer;"></i>
            </div>
            <div class="alert alert-danger mt-1 p-1" th:if="${#fields.hasErrors('password')}" role="alert">
                <p th:text="${#strings.arrayJoin(#fields.errors('password'), ', ')}" class="text-center"></p>
            </div>

            <div class="d-flex flex-column flex-md-row align-items-center custom-bg mt-3 form-input">
                <div class="label-container">
                    <span><i class="fa-solid fa-location-dot"></i></span>
                    <label class="label-text" for="location">Location</label>
                </div>
                <input type="text" th:field="${user.location}" class="form-control mt-2 mt-md-0" id="location" placeholder="Select your location" readonly required>
            </div>
            <div class="alert alert-danger mt-1 p-1" th:if="${#fields.hasErrors('location')}" role="alert">
                <p  th:text="${#strings.arrayJoin(#fields.errors('location'), ', ')}" class="text-center"></p>
            </div>
            <div id="map"></div>
            <input type="hidden" id="latitude" th:field="${user.latitude}" readonly>
            <input type="hidden" id="longitude" th:field="${user.longitude}" readonly>
            <div class="d-flex justify-content-between align-items-center ">
                <button type="button" class="btn btn-warning mt-3 py-2 fs-5" id="fetchlocation" onclick="fetchLocation()" style="width: 49.5%;">Fetch Location</button>
                <button type="submit" class="btn btn-success mt-3 py-2 fs-5" style="width: 49.5%;">Submit</button>
            </div>
            <p class="text-center fs-5 mt-3">Already have an account? <a th:href="@{/user/login}">Log in here</a>.</p>
        </form>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<script>
    const toggleLoginPassword = document.querySelector('#toggleRegisterPassword');
    const loginPassword = document.querySelector('#password');

    toggleLoginPassword.addEventListener('click', function() {
        const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
        loginPassword.setAttribute('type', type);

        if (type === 'password') {
            this.classList.remove('fa-eye');
            this.classList.add('fa-eye-slash');
        } else {
            this.classList.remove('fa-eye-slash');
            this.classList.add('fa-eye');
        }
    });
</script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const mapElement = document.getElementById('map');
        const latitudeInput = document.getElementById('latitude');
        const longitudeInput = document.getElementById('longitude');
        const locationInput = document.getElementById('location');
        const fetchLocationButton = document.getElementById('fetchlocation');

        const sriLankaBounds = [
            [5.916, 79.652],  // SW corner
            [9.835, 81.891],  // NE corner
        ];

        const map = L.map(mapElement, {
            maxBounds: sriLankaBounds,
            maxBoundsViscosity: 1.0,
        }).setView([7.8731, 80.7718], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors',
        }).addTo(map);

        let marker = null;

        // Manual location selection
        map.on('click', (e) => {
            const { lat, lng } = e.latlng;
            if (
                lat >= sriLankaBounds[0][0] &&
                lat <= sriLankaBounds[1][0] &&
                lng >= sriLankaBounds[0][1] &&
                lng <= sriLankaBounds[1][1]
            ) {
                updateLocation(lat, lng);
            } else {
                alert('Please select a location within Sri Lanka.');
            }
        });

        fetchLocationButton.addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        if (
                            latitude >= sriLankaBounds[0][0] &&
                            latitude <= sriLankaBounds[1][0] &&
                            longitude >= sriLankaBounds[0][1] &&
                            longitude <= sriLankaBounds[1][1]
                        ) {
                            updateLocation(latitude, longitude);
                        } else {
                            alert('Your location is outside Sri Lanka.');
                        }
                    },
                    (error) => {
                        alert('Unable to fetch location. Please enable location services and try again.');
                    }
                );
            } else {
                alert('Geolocation is not supported by your browser.');
            }
        });

        function updateLocation(lat, lng) {
            latitudeInput.value = lat.toFixed(6);
            longitudeInput.value = lng.toFixed(6);

            if (marker) {
                map.removeLayer(marker);
            }
            marker = L.marker([lat, lng]).addTo(map).bindPopup('Your Location').openPopup();

            map.setView([lat, lng], 15);

            fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
                .then((response) => response.json())
                .then((data) => {
                    const fullAddress = data.display_name || 'Location not found';
                    const relevantParts = fullAddress.split(',').slice(0, 3).join(', ').trim();
                    locationInput.value = relevantParts;
                    marker.bindPopup(relevantParts).openPopup();
                })
                .catch(() => {
                    locationInput.value = 'Unable to fetch location name';
                    marker.bindPopup('Unable to fetch location name').openPopup();
                });

        }
    });
</script>
</body>
</html>
