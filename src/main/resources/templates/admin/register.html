<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration</title>
    <!--poppins-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="icon" th:href="@{/images/icon.jpg}" >
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <style>
        .form-container{
            width: 70%;
            padding: 30px;
            background-color: #d3e3ef;
            margin-top: 60px;
            margin-bottom: 40px;
            border-radius: 6px;
            border: 2px solid #00418b;
        }

        .form-title {
            color: #002855;
            font-size: 24px;
            margin-bottom: 6px;
        }

        .custom-bg {
            background-color: #a6d0ee;
            border-radius: 8px;
            padding: 12px;
        }

        .form-control {
            background-color: #ecf3f8;
            border: 1px solid #6fbcf3;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #0357b7dc;
            box-shadow: 0 0 5px rgba(26, 134, 188, 0.3);
        }

        .label-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 160px;
            font-weight: bold;
        }

        /* Icon styling */
        .label-container i {
            font-size: 20px;
            color: #0357b7;
        }

        /* Label text */
        .label-text {
            font-size: 18px;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .form-title {
                font-size: 20px;
            }

            .form-control {
                padding: 12px;
                font-size: 14px;
            }

            .label-container {
                width: 120px; /* Adjusted for smaller screens */
            }

            .label-text {
                font-size: 16px;
            }

        }

        /* Eye Toggle Icon Styles */
        .form-input .fa-eye,
        .form-input .fa-eye-slash {
            position: absolute;
            left: 81%;
            cursor: pointer;
            color: #007bff;
            transition: color 0.3s ease;
        }

        .form-input .fa-eye:hover,
        .form-input .fa-eye-slash:hover {
            color: #0056b3;
        }
    </style>
</head>
<body>
<!-- sidebar -->
<div class="sidebar">
    <button class="close-sidebar" id="closeSidebar">&times;</button>

    <!-- Profile Section -->
    <div class="profile-section">
        <img th:src="@{/images/default.jpg}" alt="Profile Picture">
        <div class="info">
            <h3>Welcome Back!</h3>
            <p th:text="${adminName}"></p>
        </div>
    </div>

    <!-- Navigation Items -->

    <ul>
        <li><a th:href="@{/admin/dashboard}"><i class="fas fa-chart-line"></i> Overview</a></li>
        <li><a th:href="@{/admin/admins}" class="active"><i class="fas fa-users"></i> Admins</a></li>
        <li><a th:href="@{/disasters/reports}"><i class="fas fa-exclamation-triangle"></i> Disaster Reports</a></li>
        <li><a th:href="@{/user/users}"><i class="fas fa-users"></i> Users</a></li>
        <li><a th:href="@{/admin/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
</div>

<div class="content">
    <div class="header">
        <div class="col">
            <button id="toggleSidebar" class="toggle-button">
                <i class="fas fa-bars"></i>
            </button>
            <h2><i class="fas fa-plus"></i> Add Admin</h2>
        </div>
        <div class="col d-flex justify-content-end">
            <a th:href="@{/admin/admins}" class="btn btn-warning py-2 fs-5"><i class="fas fa-arrow-left"></i>&nbsp; Back</a>
        </div>
    </div>

    <div class="d-flex justify-content-center align-items-center">
        <div class="form-container">
            <h2 class="form-title text-center">Admin Registration</h2>
            <h5 class="text-center mb-4">Fill in the details to create your account.</h5>

            <!-- Success Alert-->
            <div th:if="${success}">
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong>Success!</strong> <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            </div>

            <!-- Error Alert-->
            <div th:if="${error}">
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Error!</strong> <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            </div>

            <form class="form-responsive" th:action="@{/admin/save}" method="POST" th:object="${admin}">
                <div class="d-flex flex-column flex-md-row align-items-center custom-bg mt-2 form-input">
                    <div class="label-container">
                        <span><i class="fa-solid fa-user"></i></span>
                        <label class="label-text">Name</label>
                    </div>
                    <input type="text" th:field="${admin.name}" id="name" class="form-control mt-2 mt-md-0" placeholder="Enter your name" required>
                </div>
                <div class="alert alert-danger mt-1 p-1" th:if="${#fields.hasErrors('name')}" role="alert">
                    <p  th:text="${#strings.arrayJoin(#fields.errors('name'), ', ')}" class="text-center"></p>
                </div>

                <div class="d-flex flex-column flex-md-row align-items-center custom-bg mt-3 form-input">
                    <div class="label-container">
                        <span><i class="fa-solid fa-at"></i></span>
                        <label class="label-text">Username</label>
                    </div>
                    <input type="text" th:field="${admin.username}" id="username" class="form-control mt-2 mt-md-0" placeholder="Enter your username" required>
                </div>
                <div class="alert alert-danger mt-1 p-1" th:if="${#fields.hasErrors('username')}" role="alert">
                    <p  th:text="${#strings.arrayJoin(#fields.errors('username'), ', ')}" class="text-center"></p>
                </div>

                <div class="d-flex flex-column flex-md-row align-items-center custom-bg mt-3 form-input">
                    <div class="label-container">
                        <span><i class="fa-solid fa-envelope"></i></span>
                        <label class="label-text">Email</label>
                    </div>
                    <input type="email" th:field="${admin.email}" id="email" class="form-control mt-2 mt-md-0" placeholder="Enter your email" required>
                </div>
                <div class="alert alert-danger mt-1 p-1" th:if="${#fields.hasErrors('email')}" role="alert">
                    <p  th:text="${#strings.arrayJoin(#fields.errors('email'), ', ')}" class="text-center"></p>
                </div>

                <div class="d-flex flex-column flex-md-row align-items-center custom-bg mt-3 form-input">
                    <div class="label-container">
                        <span><i class="fa-solid fa-lock"></i></span>
                        <label class="label-text">Password</label>
                    </div>
                    <input type="password" th:field="${admin.password}" id="password" class="form-control mt-2 mt-md-0" placeholder="Enter your password" required >
                    <i class="fas fa-eye-slash" id="toggleRegisterPassword" style="cursor: pointer;"></i>
                </div>
                <div class="alert alert-danger mt-1 p-1" th:if="${#fields.hasErrors('password')}" role="alert">
                    <p  th:text="${#strings.arrayJoin(#fields.errors('password'), ', ')}" class="text-center"></p>
                </div>

                <button type="submit" class="btn btn-success mt-3 py-2 fs-5" style="width: 100%;">Submit</button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script>
    // Toggle password visibility for login form
    const toggleLoginPassword = document.querySelector('#toggleRegisterPassword');
    const loginPassword = document.querySelector('#password');

    toggleLoginPassword.addEventListener('click', function() {
        const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
        loginPassword.setAttribute('type', type);

        // Toggle between eye and eye-slash icons
        if (type === 'password') {
            this.classList.remove('fa-eye');
            this.classList.add('fa-eye-slash');
        } else {
            this.classList.remove('fa-eye-slash');
            this.classList.add('fa-eye');
        }
    });
</script>
</body>
</html>
