<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!--poppins-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="icon" th:href="@{/images/icon.jpg}" >
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<!-- sidebar -->
<div class="sidebar">
    <button class="close-sidebar" id="closeSidebar">&times;</button>

    <!-- Profile Section -->
    <div class="profile-section">
        <img th:src="@{/images/default.jpg}" alt="Profile Picture">
        <div class="info">
            <h3>Welcome Back!</h3>
            <p th:text="${adminName}"></p>
        </div>
    </div>

    <!-- Navigation Items -->

    <ul>
        <li><a th:href="@{/admin/dashboard}" class="active"><i class="fas fa-chart-line"></i> Overview</a></li>
        <li><a th:href="@{/admin/admins}"><i class="fas fa-users"></i> Admins</a></li>
        <li><a th:href="@{/disasters/reports}"><i class="fas fa-exclamation-triangle"></i> Disaster Reports</a></li>
        <li><a th:href="@{/user/users}"><i class="fas fa-users"></i> Users</a></li>
        <li><a th:href="@{/admin/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
</div>

<div class="content">
    <div class="header">
        <button id="toggleSidebar" class="toggle-button">
            <i class="fas fa-bars"></i>
        </button>
        <h2><i class="fas fa-chart-line"></i> Overview</h2>
    </div>
    <!-- Success Alert-->
    <div th:if="${successMessage}">
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <strong>Success!</strong> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>
    <div class="review-container">
        <div class="metrics">
            <div class="card" data-color="purple">
                <i class="icon-top-right icon fas fa-file-alt"></i>
                <div class="card-content">
                    <h4>Total Reports</h4>
                    <h3 id="totalReports">0</h3>
                    <p id="reportChange">-</p>
                </div>
                <canvas id="chart1"></canvas>
            </div>
            <div class="card" data-color="blue">
                <i class="icon-top-right icon fas fa-users"></i>
                <div class="card-content ">
                    <h4>Total Users</h4>
                    <h3 id="totalUsers">0</h3>
                    <p id="userChange">-</p>
                </div>
                <canvas id="chart2"></canvas>
            </div>
        </div>
        <div id="chartContainer">
            <h2>Disasters</h2>
            <canvas id="disastersChart"></canvas>
        </div>
    </div>
    <div class="table-chart">
        <div class="bar-chart">
            <h2>Reports By Status</h2>
            <canvas id="reportStatusChart"></canvas>
        </div>
        <div class="table">
            <div class="latest-reports">
            <h2>Latest Reports</h2>
            <table id="reportsTable">
                <thead>
                <tr>
                    <th>Reported By</th>
                    <th>Location</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="disasterBody">

                </tbody>
            </table>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        fetchDashboardData();
    });

    function fetchDashboardData() {
        fetchTotalReports();
        fetchTotalUsers();
        fetchDisastersByType();
        fetchReportsByStatus();
        fetchLatestReports();
    }



    function fetchTotalReports() {
        fetch('/api/dashboard/totalReports')
            .then(response => response.json())
            .then(data => {
                document.getElementById("totalReports").innerText = data.totalReports;
                document.getElementById("reportChange").innerHTML = data.change >= 0
                    ? `<span style="color:green;">▲ ${data.change.toFixed(2)}%</span>`
                    : `<span style="color:red;">▼ ${data.change.toFixed(2)}%</span>`;
            });
    }


    function fetchTotalUsers() {
        fetch('/api/dashboard/totalUsers')
            .then(response => response.json())
            .then(data => {
                document.getElementById("totalUsers").innerText = data.totalUsers;
                document.getElementById("userChange").innerHTML = data.change >= 0
                    ? `<span style="color:green;">▲ ${data.change.toFixed(2)}%</span>`
                    : `<span style="color:red;">▼ ${data.change.toFixed(2)}%</span>`;
            });
    }

    function fetchDisastersByType() {
        fetch('/api/dashboard/disastersByType')
            .then(response => response.json())
            .then(data => {
                console.log('data for PIE chart', data);
                const labels = data.map(item => item.type);
                const counts = data.map(item => item.count);
                console.log('labels: ', labels);
                console.log('counts: ', counts);

                new Chart(document.getElementById('disastersChart'), {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: counts,
                            backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#71e457', '#EC66C0', '#4BC0C0'],
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                labels: {
                                    color: 'black',
                                    font: {
                                        weight: 'bold',
                                        size: 15
                                    }
                                }
                            },
                            datalabels: {
                                color: 'white',
                                font: {
                                    weight: 'bold',
                                    size: 16
                                },
                                formatter: (value, context) => {
                                    const total = context.dataset.data.reduce((acc, val) => acc + val, 0); // Total count
                                    const percentage = ((value / total) * 100).toFixed(1); // Percentage calculation
                                    return `${percentage}%`;
                                },
                                anchor: 'center',
                                align: 'center'
                            }
                        }
                    },
                    plugins: [ChartDataLabels] // Activate the DataLabels plugin
                });
            })
            .catch(error => console.error('Error loading pie chart data:', error));
    }


    // ✅ Function to Fetch and Display the Bar Chart (Disasters by Status)
    function fetchReportsByStatus() {
        fetch('/api/dashboard/reportsByStatus')
            .then(response => response.json())
            .then(data => {
                const labels = data.map(item => item.status);
                const counts = data.map(item => item.count);

                new Chart(document.getElementById('reportStatusChart'), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Reports by Status',
                            data: counts,
                            backgroundColor: [
                                'rgba(60, 142, 245, 0.4)', // Blue
                                'rgba(101, 116, 205, 0.4)', // Purple
                                'rgba(253, 108, 77, 0.4)', // orange
                                'rgba(80, 198, 168, 0.4)', // Green
                                'rgba(255, 0, 0, 0.4)' // Light Blue
                            ],
                            borderColor: [
                                'rgba(60, 142, 245, 0.8)',
                                'rgba(101, 116, 205, 0.8)',
                                'rgba(253, 108, 77, 0.8)',
                                'rgba(80, 198, 168, 0.8)',
                                'rgba(255, 0, 0, 0.8)'
                            ],
                            borderWidth: 1
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        responsive: true,
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: { beginAtZero: true, color: '#000' }
                            },
                            y: {
                                grid: { display: false },
                                ticks: { beginAtZero: true, color: '#000' }
                            }
                        }
                    }
                });
            })
            .catch(error => console.error('Error loading bar chart data:', error));
    }



    function fetchLatestReports() {
        fetch('/api/dashboard/latestReports')
            .then(response => response.json())
            .then(data => {
                const disasterBody = document.getElementById("disasterBody");
                disasterBody.innerHTML = ""; // Clear previous data

                data.forEach(report => {
                    const row = `<tr>
                        <td>${report.fullName}</td>
                        <td>${report.address}</td>
                        <td>${report.disasterType}</td>
                        <td>${report.status}</td>
                        <td><a href="/disasters/${report.id}"><button class="btn btn-primary">Details</button></a></td>
                    </tr>`;
                    disasterBody.innerHTML += row;
                });
            });


    }
</script>
<script>
    const cardChartOptions = {
        maintainAspectRatio: false,
        responsive: true,
        elements: {
            line: {
                tension: 0.3  // Creates a smooth wavy curve
            },
            point: {
                radius: 0  // Removes data points
            }
        },
        plugins: {
            legend: { display: false },
            tooltip: { enabled: false }
        },
        scales: {
            x: { display: false, grid: { display: false } },
            y: { display: false, grid: { display: false } }
        }
    };

    var ctx1 = document.getElementById('chart1').getContext('2d');
    new Chart(ctx1, {
        type: 'line',
        data: {
            labels: [1, 2, 3, 4, 5, 6, 7],
            datasets: [{
                data: [2, 4, 3, 5, 7, 6, 8],
                borderColor: 'rgba(101, 116, 205, 0.8)',
                backgroundColor: "rgba(101, 116, 205, 0.1)",
                borderWidth: 2,
                fill: true
            }]
        },
        options: cardChartOptions
    });

    var ctx2 = document.getElementById('chart2').getContext('2d');
    new Chart(ctx2, {
        type: 'line',
        data: {
            labels: [3, 5, 7, 8, 6, 3, 5],
            datasets: [{
                data: [2, 4, 3, 5, 7, 6, 8],
                backgroundColor: "rgba(60, 142, 245, 0.1)",
                borderColor: "rgba(60, 142, 245, 0.8)",
                borderWidth: 2,
                data: [3, 5, 7, 8, 6, 3, 5],
                fill: true
            }]
        },
        options: cardChartOptions
    });
</script>
</body>
</html>
