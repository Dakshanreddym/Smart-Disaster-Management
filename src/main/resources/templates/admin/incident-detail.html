<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Detail</title>
    <!--poppins-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="icon" th:href="@{/images/icon.jpg}" >
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <style>
        .report-image {
            position: relative;
            height: 300px;
            background-color: #bebdbd;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .report-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .report-details-section {
            padding: 30px;
            max-width: 800px;
            margin: 20px auto;
            background-color: #d3e3ef;
            border-radius: 6px;
            border: 2px solid #00418b;
        }
        p{
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
<!-- sidebar -->
<div class="sidebar">
    <button class="close-sidebar" id="closeSidebar">&times;</button>

    <!-- Profile Section -->
    <div class="profile-section">
        <img th:src="@{/images/default.jpg}" alt="Profile Picture">
        <div class="info">
            <h3>Welcome Back!</h3>
            <p th:text="${adminName}"></p>
        </div>
    </div>

    <!-- Navigation Items -->

    <ul>
        <li><a th:href="@{/admin/dashboard}"><i class="fas fa-chart-line"></i> Overview</a></li>
        <li><a th:href="@{/admin/admins}"><i class="fas fa-users"></i> Admins</a></li>
        <li><a th:href="@{/disasters/reports}" class="active"><i class="fas fa-exclamation-triangle"></i> Disaster Reports</a></li>
        <li><a th:href="@{/user/users}"><i class="fas fa-users"></i> Users</a></li>
        <li><a th:href="@{/admin/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
</div>

<div class="content">
    <div class="header">
        <div class="col">
            <button id="toggleSidebar" class="toggle-button">
                <i class="fas fa-bars"></i>
            </button>
            <h2><i class="fas fa-exclamation-triangle"></i> Incident Details</h2>
        </div>
        <div class="col d-flex justify-content-end">
            <a th:href="@{/disasters/reports}" class="btn btn-warning py-2 fs-5"><i class="fas fa-arrow-left"></i>&nbsp; Back</a>
        </div>
    </div>
    <div class="report-details-section">
        <h2 class="text-center mb-4">Report Details</h2>
        <div class="report-image mb-4" id="image">
            <img th:src="${#strings.isEmpty(disaster.image)} ? '/images/defaultImage.jpg' : '/images/' + ${disaster.image}"
                 alt="Disaster Image"
                 class="img-fluid" />
        </div>
        <div class="reporter-info">
            <p><strong>Name:</strong> <span th:text="${disaster.fullName}"></span></p>
            <p><strong>Email:</strong> <span th:text="${disaster.email}"></span></p>
            <p><strong>Phone Number:</strong> <span th:text="${disaster.phoneNumber}"></span></p>
            <p><strong>NIC Number:</strong> <span th:text="${disaster.nicNumber}"></span></p>
            <p><strong>Address:</strong> <span th:text="${disaster.address}"></span></p>
            <p><strong>GN Division:</strong> <span th:text="${disaster.gnDivision}"></span></p>
            <p><strong>District:</strong> <span th:text="${disaster.district}"></span></p>
            <p><strong>Province:</strong> <span th:text="${disaster.province}"></span></p>
            <p><strong>Disaster Type:</strong> <span th:text="${disaster.disasterType}"></span></p>
            <p><strong>Severity:</strong> <span th:text="${disaster.severity}"></span></p>
            <p><strong>Affected Individuals:</strong> <span th:text="${disaster.affectedIndividuals}"></span></p>
            <p><strong>Status:</strong> <span th:text="${disaster.status}"></span></p>
            <p><strong>Impact:</strong> <span th:text="${disaster.impact}"></span></p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<script th:src="@{/js/sidebar.js}"></script>
</body>
</html>
