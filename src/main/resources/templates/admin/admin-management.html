<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Management</title>
    <!--poppins-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="icon" th:href="@{/images/icon.jpg}" >
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admins.css}">
</head>
<body>
<!-- sidebar -->
<div class="sidebar">
    <button class="close-sidebar" id="closeSidebar">&times;</button>

    <!-- Profile Section -->
    <div class="profile-section">
        <img th:src="@{/images/default.jpg}" alt="Profile Picture">
        <div class="info">
            <h3>Welcome Back!</h3>
            <p th:text="${adminName}"></p>
        </div>
    </div>

    <!-- Navigation Items -->

    <ul>
        <li><a th:href="@{/admin/dashboard}"><i class="fas fa-chart-line"></i> Overview</a></li>
        <li><a th:href="@{/admin/admins}" class="active"><i class="fas fa-users"></i> Admins</a></li>
        <li><a th:href="@{/disasters/reports}"><i class="fas fa-exclamation-triangle"></i> Disaster Reports</a></li>
        <li><a th:href="@{/user/users}"><i class="fas fa-users"></i> Users</a></li>
        <li><a th:href="@{/admin/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
</div>

<div class="content">
    <div class="header">
        <button id="toggleSidebar" class="toggle-button">
            <i class="fas fa-bars"></i>
        </button>
        <h2><i class="fas fa-users"></i> Admins</h2>
    </div>
    <div class="buttons-container">
        <a th:href="@{/admin/register}" class="btn btn-warning py-3 px-4 fs-4"><i class="fas fa-plus"></i>&nbsp; Admin</a>
    </div>
    <!-- Success Alert-->
    <div th:if="${successMessage}"  class="mr-2 ml-2">
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <strong>Success!</strong> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>
    <table id="adminsTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Created At</th>
            <th>Name</th>
            <th>Email</th>
            <th>Username</th>
            <th>Enabled</th>
            <th>Password</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="admin: ${adminList}">
            <td th:text="${admin.id}"></td>
            <td th:text="${admin.createdAt}"></td>
            <td th:text="${admin.name}"></td>
            <td th:text="${admin.email}"></td>
            <td th:text="${admin.username}"></td>
            <td th:text="${admin.enabled}"></td>
            <td>
                <div class="password-container d-flex aligns-center">
                    <span class="masked-password mr-2"
                          th:text="'********'"
                          th:data-password="${admin.password}"></span>
                    <i class="fas fa-eye toggle-password"></i>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script>
    document.querySelectorAll('.toggle-password').forEach(icon => {
        icon.addEventListener('click', function () {
            const passwordSpan = this.previousElementSibling;
            const actualPassword = passwordSpan.getAttribute('data-password');

            if (passwordSpan.textContent === '********') {
                passwordSpan.textContent = actualPassword; // Show password
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash'); // Change icon to eye-slash
            } else {
                passwordSpan.textContent = '********'; // Mask password again
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye'); // Revert back to eye icon
            }
        });
    });
</script>
</body>
</html>
