<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Login</title>
    <link rel="icon" th:href="@{/images/icon.jpg}" >
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body style="padding-top: 100px;">
<nav class="navbar navbar-expand-lg fixed-top " data-bs-theme="dark" >
    <div class="container-fluid">
        <div>
            <button class="navbar-toggler px-2 py-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand fs-3 px-4" th:href="@{/user/index}">Safe Lanka</a>
        </div>

        <div class="collapse navbar-collapse justify-content-center " id="navbarText">
            <ul class="navbar-nav fs-5">
                <li class="nav-item px-4 ">
                    <a class="nav-link" th:href="@{/user/index}">Home</a>
                </li>
                <li th:if="${!userLoggedIn}" class="nav-item px-3 ">
                    <a class="nav-link" href="index#about">About Us</a>
                </li>
                <li class="nav-item px-3 ">
                    <a class="nav-link" th:href="@{/disasters/report-incident-form}">Report Incident</a>
                </li>
                <li th:if="${!userLoggedIn}" class="nav-item px-3 ">
                    <a class="nav-link" href="index#sevices">Services</a>
                </li>
                <li th:if="${userLoggedIn}" class="nav-item px-3 ">
                    <a class="nav-link" th:href="@{/disasters/my-reports}">My Reports</a>
                </li>
            </ul>
        </div>
        <a  th:if="${!userLoggedIn}" th:href="@{/user/login}">
            <button class="btn px-4 btn-lg mr-5" type="button" id="login-button">Login</button>
        </a>
        <a  th:if="${userLoggedIn}" th:href="@{/user/logout}">
            <button class="btn btn-danger px-4 btn-lg mr-5" type="button" id="logout-button">Logout</button>
        </a>
    </div>
</nav>
<!-- Success Alert-->
<div th:if="${successMessage}" class="mr-2 ml-2">
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        <strong>Success!</strong> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>
<!-- error Alert-->
<div th:if="${errorMessage}">
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong>Error!</strong> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<div id="login-form">
    <div class="form-container">
        <h2 class="form-title text-center">Login</h2>
        <h5 class="text-center mb-4">Enter your credentials to login.</h5>
        <!-- Display error message if login fails -->
        <div th:if="${error}">
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong>Error!</strong> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>
        <form class="form-responsive"  th:action="@{/user/login}" method="POST">
            <div class="d-flex flex-column flex-md-row align-items-center custom-bg mt-3 form-input">
                <div class="label-container">
                    <span><i class="fa-solid fa-at"></i></span>
                    <label class="label-text" >Username</label>
                </div>
                <input type="text" name="username" id="username" class="form-control mt-2 mt-md-0" placeholder="Enter your username" required>
            </div>
            <div class="d-flex flex-column flex-md-row align-items-center custom-bg mt-3 form-input">
                <div class="label-container">
                    <span><i class="fa-solid fa-lock"></i></span>
                    <label class="label-text" >Password</label>
                </div>
                <input type="password" name="password" class="form-control mt-2 mt-md-0" placeholder="Enter your password" required id="password">
                <i class="fas fa-eye-slash" id="toggleLoginPassword" style="cursor: pointer;"></i>
            </div>
            <div><a class="d-flex justify-content-end align-items-center mt-2" style="text-decoration: none;">Forgot Password?</a></div>
            <button type="submit" class="btn btn-success mt-3 py-2 fs-5" style="width: 100%;">Sign in</button>
            <p class="text-center fs-5 mt-3">Don't have an account? <a th:href="@{/user/register}">Register here</a>.</p>
        </form>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<script>
    // Toggle password visibility for login form
    const toggleLoginPassword = document.querySelector('#toggleLoginPassword');
    const loginPassword = document.querySelector('#password');

    toggleLoginPassword.addEventListener('click', function() {
        const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
        loginPassword.setAttribute('type', type);

        // Toggle between eye and eye-slash icons
        if (type === 'password') {
            this.classList.remove('fa-eye');
            this.classList.add('fa-eye-slash');
        } else {
            this.classList.remove('fa-eye-slash');
            this.classList.add('fa-eye');
        }
    });
</script>
</body>
</html>
